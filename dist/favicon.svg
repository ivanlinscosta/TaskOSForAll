<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Stylized "T" letterform -->
  <!-- Top bar of T -->
  <rect x="6" y="7" width="20" height="4.5" rx="2.25" fill="white" opacity="0.95"/>
  <!-- Vertical stem of T -->
  <rect x="13" y="7" width="6" height="18" rx="3" fill="white" opacity="0.95"/>
  <!-- Small checkmark accent at bottom-right of stem -->
  <polyline points="17,21 20,24 26,17" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
