<svg viewBox="0 0 320 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="160" cy="140" rx="125" ry="105" fill="url(#aiGlow)" opacity="0.22"/>

  <!-- Neural network connections (background) -->
  <line x1="80" y1="80" x2="160" y2="140" stroke="#0EA5E9" stroke-width="1" opacity="0.2"/>
  <line x1="240" y1="80" x2="160" y2="140" stroke="#0EA5E9" stroke-width="1" opacity="0.2"/>
  <line x1="60" y1="160" x2="160" y2="140" stroke="#0EA5E9" stroke-width="1" opacity="0.2"/>
  <line x1="260" y1="160" x2="160" y2="140" stroke="#0EA5E9" stroke-width="1" opacity="0.2"/>
  <line x1="80" y1="210" x2="160" y2="140" stroke="#0EA5E9" stroke-width="1" opacity="0.2"/>
  <line x1="240" y1="210" x2="160" y2="140" stroke="#0EA5E9" stroke-width="1" opacity="0.2"/>
  <!-- Outer connections -->
  <line x1="80" y1="80" x2="60" y2="160" stroke="#38BDF8" stroke-width="0.75" opacity="0.15"/>
  <line x1="240" y1="80" x2="260" y2="160" stroke="#38BDF8" stroke-width="0.75" opacity="0.15"/>
  <line x1="60" y1="160" x2="80" y2="210" stroke="#38BDF8" stroke-width="0.75" opacity="0.15"/>
  <line x1="260" y1="160" x2="240" y2="210" stroke="#38BDF8" stroke-width="0.75" opacity="0.15"/>

  <!-- Animated pulse rings on center -->
  <circle cx="160" cy="140" r="48" stroke="#0EA5E9" stroke-width="1" opacity="0.15" stroke-dasharray="6 4"/>
  <circle cx="160" cy="140" r="34" stroke="#38BDF8" stroke-width="1" opacity="0.2" stroke-dasharray="4 3"/>

  <!-- Central brain/AI orb -->
  <circle cx="160" cy="140" r="26" fill="url(#aiOrbGrad)"/>
  <circle cx="160" cy="140" r="26" fill="none" stroke="#7DD3FC" stroke-width="1.5" opacity="0.5"/>
  <!-- Inner glow -->
  <circle cx="160" cy="140" r="18" fill="url(#aiInnerGrad)" opacity="0.8"/>
  <!-- AI icon inside -->
  <text x="160" y="136" text-anchor="middle" fill="white" font-size="9" font-family="system-ui" font-weight="900" opacity="0.9">AI</text>
  <path d="M150 144 Q160 150 170 144" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Outer nodes with labels -->
  <!-- Top left - Perfil -->
  <circle cx="80" cy="80" r="20" fill="url(#nodeGrad1)"/>
  <circle cx="80" cy="80" r="20" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.5"/>
  <text x="80" y="77" text-anchor="middle" fill="white" font-size="8" font-family="system-ui">👤</text>
  <text x="80" y="88" text-anchor="middle" fill="white" font-size="6" font-family="system-ui" font-weight="600">Perfil</text>

  <!-- Top right - Carreira -->
  <circle cx="240" cy="80" r="20" fill="url(#nodeGrad2)"/>
  <circle cx="240" cy="80" r="20" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.5"/>
  <text x="240" y="77" text-anchor="middle" fill="white" font-size="8" font-family="system-ui">💼</text>
  <text x="240" y="88" text-anchor="middle" fill="white" font-size="6" font-family="system-ui" font-weight="600">Carreira</text>

  <!-- Left - Finanças -->
  <circle cx="60" cy="160" r="20" fill="url(#nodeGrad3)"/>
  <circle cx="60" cy="160" r="20" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.5"/>
  <text x="60" y="157" text-anchor="middle" fill="white" font-size="8" font-family="system-ui">💰</text>
  <text x="60" y="168" text-anchor="middle" fill="white" font-size="6" font-family="system-ui" font-weight="600">Finanças</text>

  <!-- Right - Vagas -->
  <circle cx="260" cy="160" r="20" fill="url(#nodeGrad4)"/>
  <circle cx="260" cy="160" r="20" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.5"/>
  <text x="260" y="157" text-anchor="middle" fill="white" font-size="8" font-family="system-ui">🎯</text>
  <text x="260" y="168" text-anchor="middle" fill="white" font-size="6" font-family="system-ui" font-weight="600">Vagas</text>

  <!-- Bottom left - Conteúdo -->
  <circle cx="80" cy="210" r="20" fill="url(#nodeGrad5)"/>
  <circle cx="80" cy="210" r="20" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.5"/>
  <text x="80" y="207" text-anchor="middle" fill="white" font-size="8" font-family="system-ui">📚</text>
  <text x="80" y="218" text-anchor="middle" fill="white" font-size="6" font-family="system-ui" font-weight="600">Conteúdo</text>

  <!-- Bottom right - Insights -->
  <circle cx="240" cy="210" r="20" fill="url(#nodeGrad6)"/>
  <circle cx="240" cy="210" r="20" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.5"/>
  <text x="240" y="207" text-anchor="middle" fill="white" font-size="8" font-family="system-ui">✨</text>
  <text x="240" y="218" text-anchor="middle" fill="white" font-size="6" font-family="system-ui" font-weight="600">Insights</text>

  <!-- Floating data pills -->
  <rect x="115" y="52" width="90" height="14" rx="7" fill="#0C4A6E" opacity="0.9"/>
  <text x="160" y="62.5" text-anchor="middle" fill="#7DD3FC" font-size="6.5" font-family="system-ui" font-weight="600">Inteligência Personalizada</text>

  <rect x="104" y="220" width="112" height="14" rx="7" fill="#0C4A6E" opacity="0.85"/>
  <text x="160" y="230.5" text-anchor="middle" fill="#7DD3FC" font-size="6.5" font-family="system-ui" font-weight="600">Recomendações em tempo real</text>

  <defs>
    <radialGradient id="aiGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aiOrbGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </radialGradient>
    <radialGradient id="aiInnerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGrad1" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0369A1"/>
      <stop offset="100%" stop-color="#082F49"/>
    </radialGradient>
    <radialGradient id="nodeGrad2" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </radialGradient>
    <radialGradient id="nodeGrad3" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#022C22"/>
    </radialGradient>
    <radialGradient id="nodeGrad4" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2E1065"/>
    </radialGradient>
    <radialGradient id="nodeGrad5" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#451A03"/>
    </radialGradient>
    <radialGradient id="nodeGrad6" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0E7490"/>
      <stop offset="100%" stop-color="#082F49"/>
    </radialGradient>
  </defs>
</svg>
