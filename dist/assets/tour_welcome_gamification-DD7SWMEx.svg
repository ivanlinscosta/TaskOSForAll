<svg viewBox="0 0 320 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="160" cy="145" rx="125" ry="105" fill="url(#gameGlow)" opacity="0.25"/>

  <!-- Trophy base -->
  <rect x="143" y="195" width="34" height="8" rx="4" fill="#F59E0B" opacity="0.9"/>
  <rect x="136" y="200" width="48" height="6" rx="3" fill="#D97706" opacity="0.85"/>

  <!-- Trophy stem -->
  <rect x="154" y="180" width="12" height="18" rx="3" fill="#FBBF24" opacity="0.9"/>

  <!-- Trophy cup -->
  <path d="M120 100 L120 155 Q120 175 160 175 Q200 175 200 155 L200 100 Z" fill="url(#trophyGrad)"/>
  <path d="M120 100 L120 155 Q120 175 160 175 Q200 175 200 155 L200 100 Z" fill="none" stroke="#FDE68A" stroke-width="1.5" opacity="0.4"/>

  <!-- Trophy shine -->
  <ellipse cx="145" cy="120" rx="8" ry="18" fill="white" opacity="0.12" transform="rotate(-15 145 120)"/>

  <!-- Trophy handles -->
  <path d="M120 115 Q100 115 100 130 Q100 145 120 145" stroke="#FBBF24" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M200 115 Q220 115 220 130 Q220 145 200 145" stroke="#FBBF24" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Star in trophy center -->
  <path d="M160 120 L163 131 L175 131 L165 138 L168 149 L160 142 L152 149 L155 138 L145 131 L157 131 Z" fill="#FEF3C7" opacity="0.9"/>

  <!-- XP bar at top -->
  <rect x="64" y="58" width="192" height="22" rx="11" fill="#1C1A0A" opacity="0.7"/>
  <rect x="68" y="62" width="145" height="14" rx="7" fill="url(#xpBarGrad)"/>
  <text x="160" y="73.5" text-anchor="middle" fill="white" font-size="7" font-family="system-ui" font-weight="700" opacity="0.9">2.340 XP  ·  Nível 7</text>

  <!-- Floating badges -->
  <!-- Badge 1 - streak -->
  <circle cx="72" cy="140" r="22" fill="url(#badgeOrange)"/>
  <circle cx="72" cy="140" r="22" fill="none" stroke="#FDE68A" stroke-width="1.5" opacity="0.5"/>
  <text x="72" y="135" text-anchor="middle" fill="white" font-size="12" font-family="system-ui">🔥</text>
  <text x="72" y="149" text-anchor="middle" fill="white" font-size="6" font-family="system-ui" font-weight="700">STREAK</text>

  <!-- Badge 2 - star -->
  <circle cx="248" cy="140" r="22" fill="url(#badgePurple)"/>
  <circle cx="248" cy="140" r="22" fill="none" stroke="#DDD6FE" stroke-width="1.5" opacity="0.5"/>
  <text x="248" y="135" text-anchor="middle" fill="white" font-size="12" font-family="system-ui">⭐</text>
  <text x="248" y="149" text-anchor="middle" fill="white" font-size="6" font-family="system-ui" font-weight="700">BADGE</text>

  <!-- Sparkle dots -->
  <circle cx="108" cy="80" r="3" fill="#FDE68A" opacity="0.8"/>
  <circle cx="215" cy="75" r="2.5" fill="#FCD34D" opacity="0.7"/>
  <circle cx="76" cy="186" r="2" fill="#FDE68A" opacity="0.6"/>
  <circle cx="248" cy="188" r="2" fill="#FCD34D" opacity="0.6"/>

  <!-- Big star sparkle top right -->
  <path d="M256 52 L258 46 L260 52 L266 54 L260 56 L258 62 L256 56 L250 54 Z" fill="#FDE68A" opacity="0.8"/>
  <!-- Small sparkle -->
  <path d="M64 228 L65 225 L66 228 L69 229 L66 230 L65 233 L64 230 L61 229 Z" fill="#FCD34D" opacity="0.6"/>

  <!-- Challenge pills bottom -->
  <rect x="100" y="218" width="50" height="12" rx="6" fill="#D97706" opacity="0.8"/>
  <text x="125" y="227.5" text-anchor="middle" fill="white" font-size="6" font-family="system-ui" font-weight="600">Desafios ativos</text>
  <rect x="160" y="218" width="60" height="12" rx="6" fill="#B45309" opacity="0.7"/>
  <text x="190" y="227.5" text-anchor="middle" fill="white" font-size="6" font-family="system-ui" font-weight="600">Próxima meta 🎯</text>

  <defs>
    <radialGradient id="gameGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trophyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="xpBarGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="75%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#FDE68A" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="badgeOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </radialGradient>
    <radialGradient id="badgePurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </radialGradient>
  </defs>
</svg>
