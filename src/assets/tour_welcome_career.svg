<svg viewBox="0 0 320 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background subtle glow -->
  <ellipse cx="160" cy="150" rx="130" ry="110" fill="url(#careerGlow)" opacity="0.25"/>

  <!-- Growth chart background -->
  <rect x="56" y="80" width="208" height="130" rx="16" fill="url(#cardGrad)" opacity="0.9"/>
  <rect x="56" y="80" width="208" height="130" rx="16" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.3"/>

  <!-- Chart grid lines -->
  <line x1="80" y1="175" x2="240" y2="175" stroke="#6366F1" stroke-width="0.5" opacity="0.25"/>
  <line x1="80" y1="155" x2="240" y2="155" stroke="#6366F1" stroke-width="0.5" opacity="0.2"/>
  <line x1="80" y1="135" x2="240" y2="135" stroke="#6366F1" stroke-width="0.5" opacity="0.2"/>
  <line x1="80" y1="115" x2="240" y2="115" stroke="#6366F1" stroke-width="0.5" opacity="0.15"/>

  <!-- Chart area fill -->
  <path d="M80 170 L110 162 L140 148 L170 136 L200 122 L230 108 L240 105 L240 175 L80 175 Z" fill="url(#chartFill)" opacity="0.35"/>

  <!-- Chart line -->
  <polyline points="80,170 110,162 140,148 170,136 200,122 230,108 240,105" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Chart dots -->
  <circle cx="80" cy="170" r="3.5" fill="white"/>
  <circle cx="80" cy="170" r="2" fill="#6366F1"/>
  <circle cx="140" cy="148" r="3.5" fill="white"/>
  <circle cx="140" cy="148" r="2" fill="#6366F1"/>
  <circle cx="200" cy="122" r="3.5" fill="white"/>
  <circle cx="200" cy="122" r="2" fill="#6366F1"/>
  <circle cx="240" cy="105" r="5" fill="white"/>
  <circle cx="240" cy="105" r="3" fill="#6366F1"/>

  <!-- Top value badge -->
  <rect x="222" y="90" width="44" height="16" rx="8" fill="#6366F1"/>
  <text x="244" y="102" text-anchor="middle" fill="white" font-size="7.5" font-family="system-ui" font-weight="700">+ Nível</text>

  <!-- Person silhouette (left side, front of chart) -->
  <circle cx="108" cy="68" r="18" fill="url(#personGrad)"/>
  <!-- Face details -->
  <circle cx="104" cy="65" r="2" fill="white" opacity="0.8"/>
  <circle cx="112" cy="65" r="2" fill="white" opacity="0.8"/>
  <path d="M104 72 Q108 75 112 72" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.8"/>

  <!-- Body -->
  <path d="M90 100 Q90 88 108 88 Q126 88 126 100" fill="url(#personGrad)" opacity="0.8"/>

  <!-- Briefcase icon -->
  <rect x="148" y="92" width="30" height="22" rx="4" fill="#4F46E5" opacity="0.9"/>
  <rect x="155" y="88" width="16" height="8" rx="3" fill="#4F46E5" opacity="0.7" stroke="#818CF8" stroke-width="1"/>
  <line x1="148" y1="100" x2="178" y2="100" stroke="#818CF8" stroke-width="1" opacity="0.5"/>
  <rect x="161" y="98" width="8" height="6" rx="1" fill="#818CF8" opacity="0.6"/>

  <!-- Skill chips -->
  <rect x="64" y="196" width="36" height="12" rx="6" fill="#4F46E5" opacity="0.8"/>
  <text x="82" y="205.5" text-anchor="middle" fill="white" font-size="6" font-family="system-ui" font-weight="600">Carreira</text>

  <rect x="106" y="196" width="36" height="12" rx="6" fill="#6366F1" opacity="0.7"/>
  <text x="124" y="205.5" text-anchor="middle" fill="white" font-size="6" font-family="system-ui" font-weight="600">Habilidades</text>

  <rect x="148" y="196" width="30" height="12" rx="6" fill="#818CF8" opacity="0.7"/>
  <text x="163" y="205.5" text-anchor="middle" fill="white" font-size="6" font-family="system-ui" font-weight="600">Vagas</text>

  <rect x="184" y="196" width="36" height="12" rx="6" fill="#4F46E5" opacity="0.65"/>
  <text x="202" y="205.5" text-anchor="middle" fill="white" font-size="6" font-family="system-ui" font-weight="600">Análise IA</text>

  <!-- Upward arrow -->
  <path d="M254 60 L260 48 L266 60" stroke="#818CF8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="260" y1="48" x2="260" y2="75" stroke="#818CF8" stroke-width="2" stroke-linecap="round"/>

  <!-- Stars -->
  <path d="M56 58 L57.2 54 L58.4 58 L62 59.2 L58.4 60.4 L57.2 64 L56 60.4 L52.4 59.2 Z" fill="#C7D2FE" opacity="0.7"/>
  <path d="M270 200 L271 197 L272 200 L275 201 L272 202 L271 205 L270 202 L267 201 Z" fill="#A5B4FC" opacity="0.6"/>

  <defs>
    <radialGradient id="careerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B4B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#312E81" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="personGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
  </defs>
</svg>
